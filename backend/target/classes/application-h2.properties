# Persistente H2-Datei unter ./data/ (Arbeitsverzeichnis beim Start, z. B. backend/)
spring.datasource.url=jdbc:h2:file:./data/taskmanager;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

# Kein automatisches data-h2.sql: sonst würde bei jedem Start gelöscht und neu eingespielt
spring.sql.init.mode=never
