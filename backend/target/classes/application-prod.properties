spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/taskmanager}
spring.datasource.username=${DATABASE_USER:taskmanager}
spring.datasource.password=${DATABASE_PASSWORD:taskmanager}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false

# Erststart: optional Demo-Daten + Sequenzen setzen
spring.sql.init.mode=${SQL_INIT_MODE:never}
spring.sql.init.data-locations=classpath:data-postgres-seed.sql
