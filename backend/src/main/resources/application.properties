server.port=8081

# Profil: h2 (Standard, persistente Datei ./data/taskmanager.*) oder prod (PostgreSQL)
spring.profiles.default=h2

# JWT (mind. 32 Zeichen für HS256)
app.jwt.secret=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
app.jwt.expiration-ms=86400000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Einladungs-Link im E-Mail (Frontend-URL)
app.frontend-base-url=http://localhost:3000

# E-Mail (optional; ohne Host wird nur geloggt)
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@localhost}
